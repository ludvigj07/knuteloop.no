    <meta name="apple-mobile-web-app-title" content="Knuteloop" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Open Graph for deling i sosiale medier og chat -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Knuteloop" />
    <meta property="og:title" content="Knuteloop — Russeknuter for St. Olav" />
    <meta property="og:description" content="Gjør knuter, samle poeng og se hvem som leder kullet." />
    <meta property="og:image" content="/icon-512.png" />
    <meta property="og:locale" content="nb_NO" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Knuteloop" />
    <meta name="twitter:description" content="Russeknute-appen for St. Olav vgs." />
    <meta name="twitter:image" content="/icon-512.png" />
    <meta name="color-scheme" content="light dark" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Knuteloop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@700;800&family=Inter:wght@400;500;600&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@700;800&family=Inter:wght@400;500;600&display=swap" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@700;800&family=Inter:wght@400;500;600&display=swap" /></noscript>
  </head>
  <body>
    <style>
      /* Initial splash for å unngå hvit blink før React mounter */
      #initial-splash {
        position: fixed; inset: 0; display: grid; place-items: center;
        background: #fdf8e8; z-index: 9999;
        font-family: -apple-system, system-ui, 'Segoe UI', sans-serif;
      }
      @media (prefers-color-scheme: dark) {
        #initial-splash { background: #0b1024; color: #f3f1e6; }
      }
      #initial-splash .dot {
        width: 10px; height: 10px; border-radius: 999px; background: #1e3a8a;
        display: inline-block; margin: 0 3px; opacity: 0.4;
        animation: is-bob 1.2s ease-in-out infinite;
      }
      #initial-splash .dot:nth-child(2) { animation-delay: .15s }
      #initial-splash .dot:nth-child(3) { animation-delay: .3s }
      #initial-splash h1 {
        margin: 0 0 14px; font-size: 1.6rem; letter-spacing: -0.03em;
        color: #11183a;
      }
      @media (prefers-color-scheme: dark) {
        #initial-splash h1 { color: #f3f1e6; }
        #initial-splash .dot { background: #6e8bff; }
      }
      @keyframes is-bob {
        0%,100% { transform: translateY(0); opacity: .4 }
        40% { transform: translateY(-5px); opacity: 1 }
      }
    </style>
    <div id="root">
      <div id="initial-splash" aria-hidden="true">
        <div style="text-align:center">
          <h1>Knuteloop</h1>
          <div><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
        </div>
      </div>
    </div>
    <script type="module" src="/frontend/main.jsx"></script>
  </body>
</html>
