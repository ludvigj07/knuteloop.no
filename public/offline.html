<!doctype html>
<html lang="nb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1e3a8a" />
    <title>Offline · Knuteloop</title>
    <link rel="icon" href="/icon-192.png" />
    <style>
      :root {
        --bg: #fdf8e8;
        --ink: #11183a;
        --primary: #1e3a8a;
        --accent: #ffc629;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0b1024;
          --ink: #f3f1e6;
          --primary: #6e8bff;
        }
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        font-family: 'Inter', -apple-system, system-ui, Segoe UI, sans-serif;
        background: var(--bg);
        color: var(--ink);
        display: grid;
        place-items: center;
        padding: 24px;
        text-align: center;
      }
      .card {
        max-width: 420px;
        background: rgba(255, 255, 255, 0.6);
        border: 2px solid var(--ink);
        border-radius: 24px;
        padding: 32px 24px;
        box-shadow: 4px 4px 0 0 var(--ink);
      }
      @media (prefers-color-scheme: dark) {
        .card { background: rgba(20, 26, 56, 0.6); box-shadow: none; }
      }
      .emoji { font-size: 56px; line-height: 1; margin-bottom: 12px; }
      h1 {
        font-family: 'Bricolage Grotesque', Inter, sans-serif;
        font-size: 1.8rem;
        margin: 0 0 8px;
        letter-spacing: -0.02em;
      }
      p { margin: 0 0 20px; opacity: 0.8; line-height: 1.5; }
      button {
        appearance: none;
        background: var(--accent);
        color: var(--ink);
        border: 2px solid var(--ink);
        border-radius: 999px;
        padding: 12px 24px;
        font-weight: 800;
        font-size: 1rem;
        font-family: inherit;
        cursor: pointer;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        box-shadow: 3px 3px 0 0 var(--ink);
        transition: transform 0.12s ease, box-shadow 0.12s ease;
      }
      button:active {
        transform: translate(2px, 2px);
        box-shadow: 0 0 0 0 var(--ink);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="emoji">📡</div>
      <h1>Du er offline</h1>
      <p>Knuteloop trenger nett for å hente knuter og bilder. Sjekk Wi-Fi eller mobildata, så er vi i gang igjen.</p>
      <button onclick="location.reload()">Prøv på nytt</button>
    </div>
  </body>
</html>
